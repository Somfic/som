[package]
name = "som"
version = "0.1.0"
edition = "2024"

[workspace]
members = ["crates/*"]
resolver = "3"

[dependencies]
som_common = { workspace = true }
som_ast = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
insta = "1.47"

[workspace.dependencies]
tracing = "0.1.44"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
som_common = { path = "crates/common" }
som_ast = { path = "crates/ast" }
